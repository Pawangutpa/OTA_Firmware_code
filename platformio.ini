[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
upload_speed = 921600

build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D CONFIG_FREERTOS_USE_TRACE_FACILITY=1
    -D CONFIG_FREERTOS_USE_STATS_FORMATTING_FUNCTIONS=1
    -D FW_VERSION=\"1.0.5\"



board_build.partitions = partitions_ota.csv
; Keep at 4MB to match partitions_ota.csv. If your S3 module has 8/16MB flash
; and you want the extra space, bump this AND grow the app0/app1 slots.
board_build.flash_size = 4MB

lib_deps =
  knolleary/PubSubClient

